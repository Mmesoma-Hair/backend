# IdealCommerce API — nginx site for api.nasuru.com
# Place at /etc/nginx/sites-available/nasuru-api and symlink into sites-enabled.
# `certbot --nginx -d api.nasuru.com` rewrites this to add the HTTPS (443) block
# and an HTTP->HTTPS redirect.

upstream nasuru_api {
    server unix:/run/nasuru-api/gunicorn.sock fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.nasuru.com;

    # Allow large-ish uploads (product images proxied to Cloudinary).
    client_max_body_size 20M;

    # Let's Encrypt HTTP-01 challenge.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Django collectstatic output (admin assets, DRF browsable API, Swagger UI).
    location /static/ {
        alias /home/prime/nasuru-api/staticfiles/;
        access_log off;
        expires 30d;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Drives Django's SECURE_PROXY_SSL_HEADER so it knows the request is TLS.
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_pass http://nasuru_api;
    }
}
