name: Deploy to Droplet

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: mmeso
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "~/backend"
          # Don't clobber the server-only .env (it isn't in the repo anyway).
          overwrite: true

      - name: Install, migrate and restart
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_IP }}
          username: mmeso
          key: ${{ secrets.SSH_KEY }}
          # deploy.sh exports config.settings.prod, installs (frozen, no dev),
          # migrates, collects static and restarts the services. Keeping the
          # logic in one tested script avoids settings-module drift here.
          script: |
            cd ~/backend && bash deploy/deploy.sh

