<!doctype html>
<html>
  <body style="margin:0;background:#f5f5f5;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#1a1a1a;">
    <div style="max-width:560px;margin:0 auto;padding:24px;">
      <div style="text-align:left;padding-bottom:16px;">
        {% if logo_url %}<img src="{{ logo_url }}" alt="{{ store_name }}" height="36" style="height:36px;" />{% else %}<strong style="font-size:18px;">{{ store_name }}</strong>{% endif %}
      </div>
      <div style="background:#ffffff;border:1px solid #eaeaea;border-radius:10px;padding:28px;">
        {% block content %}{% endblock %}
      </div>
      <p style="color:#999;font-size:12px;margin-top:20px;">
        Need help? Contact <a href="mailto:{{ support_email }}" style="color:#666;">{{ support_email }}</a>.
      </p>
    </div>
  </body>
</html>
